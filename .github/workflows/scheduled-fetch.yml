name: Scheduled Email Fetch

on:
  schedule:
    # JST 9:00, 12:00, 15:00, 18:00, 21:00
    - cron: '0 0,3,6,9,12 * * *'
  workflow_dispatch: {}

jobs:
  fetch-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wake up Render server
        run: |
          echo "Waking up Render server..."
          curl -sf -o /dev/null -w "%{http_code}" \
            https://gmail-analyzer-api.onrender.com/api/fetch/status \
            || true
          echo ""
          echo "Waiting 60s for server to be ready..."
          sleep 60

      - name: Trigger cron pipeline
        run: |
          echo "Calling cron endpoint..."
          HTTP_CODE=$(curl -sf -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            https://gmail-analyzer-api.onrender.com/api/fetch/cron)

          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/response.json 2>/dev/null || true
          echo ""

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Cron pipeline trigger failed with status $HTTP_CODE"
            exit 1
          fi

          echo "Pipeline triggered successfully."

      - name: Keep Render alive during processing
        run: |
          echo "Keeping Render alive while pipeline processes..."
          MAX_WAIT=1200  # 最大20分待機
          INTERVAL=30    # 30秒ごとにping
          ELAPSED=0
          PREV_UNPROCESSED=999999

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            # ステータスをチェック（ping兼用でRenderを起こし続ける）
            STATUS=$(curl -sf --max-time 10 \
              https://gmail-analyzer-api.onrender.com/api/fetch/status 2>/dev/null || echo "")

            if [ -z "$STATUS" ]; then
              echo "[$ELAPSED s] Server not responding, retrying..."
              continue
            fi

            UNPROCESSED=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('unprocessed_emails',0))" 2>/dev/null || echo "?")
            TOTAL=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_listings',0))" 2>/dev/null || echo "?")

            echo "[$ELAPSED s] Unprocessed: $UNPROCESSED | Total listings: $TOTAL"

            # 未処理が0になったら完了
            if [ "$UNPROCESSED" = "0" ]; then
              echo "All emails processed!"
              break
            fi

            # 未処理数が変わらなくなったら（3回連続同じ = 90秒間変化なし）パイプラインが停止した可能性
            if [ "$UNPROCESSED" = "$PREV_UNPROCESSED" ] && [ $ELAPSED -gt 300 ]; then
              STALL_COUNT=$((${STALL_COUNT:-0} + 1))
              if [ $STALL_COUNT -ge 3 ]; then
                echo "::warning::Processing appears stalled (no change for 90s). Ending wait."
                break
              fi
            else
              STALL_COUNT=0
            fi

            PREV_UNPROCESSED=$UNPROCESSED
          done

          echo "Keep-alive loop finished after ${ELAPSED}s."
